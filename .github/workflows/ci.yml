name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  test:
    name: Test and license checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests
        run: npm test

      - name: Run licensing check
        run: python3 scripts/check_ruleoak_licensing.py

      - name: Run phase 1-4 structural checks
        run: npm run check:phase1-4

      - name: Run phase 5 structural checks
        run: npm run check:phase5
